name: moltenhub-system-design-ci

on:
  push:
    branches:
      - moltenhub-work-inside-the-system-design-directory
  pull_request:
    branches:
      - '**'

jobs:
  markdown-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install mdformat
        run: |
          python -m pip install --upgrade pip
          pip install mdformat

      - name: Verify markdown formatting
        run: mdformat --check system-design
